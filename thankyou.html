<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Master Diagnostics</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0D1B2A;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-top: 4px solid #D92B2B;
            border-radius: 16px;
            padding: 50px 40px;
            backdrop-filter: blur(10px);
        }

        .checkmark {
            width: 90px;
            height: 90px;
            background: #D92B2B;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 15px;
        }

        p {
            color: #B8C4CF;
            line-height: 1.7;
            font-size: 1.05rem;
            margin-bottom: 15px;
        }

        .home-btn {
            display: inline-block;
            margin-top: 25px;
            background: #D92B2B;
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .small-text {
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.75;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="checkmark">✓</div>

        <h1>Thank You!</h1>

        <p>
            Your quote request has been successfully submitted.
        </p>

        <p>
            A member of the Master Diagnostics team will review your enquiry and get back to you as soon as possible.
        </p>

        <a href="https://easywebsiteco-byte.github.io/MasterDiagnostics/" class="home-btn">
            Return to Homepage
        </a>

        <p class="small-text">
            Need immediate assistance? Give us a call and we'll be happy to help.
        </p>
    </div>

</body>
</html>
